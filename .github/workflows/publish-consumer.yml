name: Publish Consumer Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/publish-consumer.yml"
      - "**/*.cs"
      - "*.csproj"
      - "Dockerfile"
      - ".dockerignore"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPO: ${{ secrets.QUICKLYCOOK_ECR_REPO }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore CookConsumer.sln

      - name: Build
        run: dotnet build CookConsumer.sln --configuration Release --no-restore

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push consumer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REPO }}:consumer-${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REPO }}:consumer-main
